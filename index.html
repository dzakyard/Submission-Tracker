<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submission Tracker</title>
  <link rel="stylesheet" href="src/output.css">
</head>
<body class="font-mono bg-gray-100">

<div class="max-w-3xl mx-auto flex flex-col p-5">
  <h2 class="text-center text-3xl font-bold p-5 pb-1">Form Submission Tracker</h2>
  <p class="sub">Remembers which Google Forms you've submitted — persists even after refresh.</p>

  <div class="stats flex justify-center gap-40 text-center pt-3" id="stats"></div>

  <div class="flex justify-between pb-2">
    <span class="content-center">Your forms</span>
    <button class="bg-white p-2 px-3 rounded-lg cursor-pointer transition duration-300 ease-in-out hover:bg-black/5 active:bg-black/10" onclick="toggleAdd()">+ Add form</button>
  </div>

  <div class="flex flex-col bg-white p-5 rounded-xl hidden" id="add-form">
    <div class="flex flex-col">
      <label class="pb-1">Form name</label>
      <input class="p-2 bg-gray-100 rounded-lg" type="text" id="inp-name" placeholder="e.g. Weekly status report" />
    </div>
    <div class="flex flex-col py-3">
      <label class="py-1">Google Form URL (optional)</label>
      <input class="p-2 bg-gray-100 rounded-lg" type="url" id="inp-url" placeholder="https://forms.gle/..." />
    </div>
    <div class="">
      <div class="flex flex-col">
        <label class="py-1">Date</label>
        <input class="p-2 bg-gray-100 rounded-lg" type="date" id="inp-deadline"/>
      </div>
      <div class="form-row">
      </div>
    </div>
    <div class="flex pt-3 gap-5">
      <button class="btn-primary p-2 bg-gray-100 rounded-lg cursor-pointer transition duration-300 ease-in-out hover:bg-black/5 active:bg-black/10" onclick="addForm()">Save</button>
      <button class="btn-ghost p-2 bg-gray-100 rounded-lg cursor-pointer transition duration-300 ease-in-out hover:bg-black/5 active:bg-black/10" onclick="toggleAdd()">Cancel</button>
    </div>
  </div>

  <div id="forms-list"></div>
</div>

  <script src="script.js"></script>

</body>
</html>
